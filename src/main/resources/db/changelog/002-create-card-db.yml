databaseChangeLog:
  - changeSet:
      id: create_cards_tables
      author: seecret1
      preConditions:
        - onFail: MARK_RAN
          not:
            - tableExists:
                tableName: cards
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: number
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: number_hash
                  type: VARCHAR(64)
                  constraints:
                    unique: true
              - column:
                  name: date_activation
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: date_expiry
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(12)
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: DECIMAL(10,2)
                  defaultValue: 0.00
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            constraintName: fk_card_owner
            baseTableName: cards
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE